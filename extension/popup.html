<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 360px;
      min-height: 200px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0b0b0f;
      color: #f2f2f2;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .pill {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid #2a2a3c;
      background: #0f0f15;
      color: #bdbdd0;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #bdbdd0;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #2a2a3c;
      background: #0f0f15;
      color: #f2f2f2;
      font-size: 13px;
    }
    input:focus, select:focus {
      outline: none;
      border-color: #4a4a5c;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    button {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #2a2a3c;
      background: #1a1a25;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    button:hover {
      background: #202030;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      display: none;
    }
    .message.success {
      display: block;
      background: #1a3a1a;
      border: 1px solid #2a5a2a;
      color: #7af27a;
    }
    .message.error {
      display: block;
      background: #3a1a1a;
      border: 1px solid #5a2a2a;
      color: #f27a7a;
    }
    .settings {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2a2a3c;
    }
    .settings-toggle {
      font-size: 11px;
      color: #bdbdd0;
      cursor: pointer;
      text-decoration: underline;
    }
    .settings-form {
      display: none;
      margin-top: 12px;
    }
    .settings-form.show {
      display: block;
    }
    .muted {
      color: #bdbdd0;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Opportune</h1>
    <span class="pill">Job Tracker</span>
  </div>

  <form id="jobForm">
    <div class="form-group">
      <label for="company">Company</label>
      <input type="text" id="company" name="company" required placeholder="e.g., Acme Corp">
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <input type="text" id="role" name="role" required placeholder="e.g., Software Engineer">
    </div>

    <div class="row">
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location" placeholder="e.g., Remote">
      </div>
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status">
          <option value="Applied">Applied</option>
          <option value="Interview">Interview</option>
          <option value="Offer">Offer</option>
          <option value="Rejected">Rejected</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label for="link">Job URL</label>
      <input type="url" id="link" name="link" placeholder="https://...">
    </div>

    <div class="form-group">
      <label for="salaryRange">Salary Range (optional)</label>
      <input type="text" id="salaryRange" name="salaryRange" placeholder="e.g., $90k - $120k">
    </div>

    <button type="submit" id="submitBtn">Add to Tracker</button>
    <div id="message" class="message"></div>
  </form>

  <div class="settings">
    <span class="settings-toggle" id="settingsToggle">⚙️ Settings</span>
    <div class="settings-form" id="settingsForm">
      <div class="form-group">
        <label for="apiKey">API Key</label>
        <input type="text" id="apiKey" name="apiKey" placeholder="opportune_...">
        <p class="muted">Get your API key from the Opportune dashboard</p>
      </div>
      <div class="form-group">
        <label for="apiUrl">API URL</label>
        <input type="text" id="apiUrl" name="apiUrl" value="http://localhost:4321" placeholder="http://localhost:4321">
      </div>
      <button type="button" id="saveSettings">Save Settings</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
